services:
  - type: web
    name: histology-portal-backend
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: histology-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: histology-portal-frontend
          property: url
      - key: JWT_SECRET
        generateValue: true
  
  - type: web
    name: histology-portal-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: histology-portal-backend
          property: url

databases:
  - name: histology-db
    ipAllowList: []
    plan: free
    postgresMajorVersion: "15"
