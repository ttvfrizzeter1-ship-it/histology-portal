services:
  - type: web
    name: histology-portal-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: histology-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
  
  - type: web
    name: histology-portal-frontend
    runtime: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - path: /api
        service: histology-portal-backend

databases:
  - name: histology-db
    ipAllowList: []
    plan: free
    postgresVersion: "15"
